on: [push]
jobs:
    build:
        runs-on: docker
        steps:
            - run: echo test
            - uses: actions/checkout@v6
            - uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '9.0.x'
            - run: cp gex/env.template.json gex/env.json
            - run: cp gex/secrets.template.json gex/secrets.json
            - run: cd gex
            - run: echo $(pwd)
            - run: dotnet build --self-contained -c Release -p:RuntimeWorkaround=linux-x64

