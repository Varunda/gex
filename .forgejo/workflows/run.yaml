on: [push]
jobs:
    build:
        runs-on: docker
        steps:
            - run: echo test
            - uses: actions/checkout@v6
            - uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '9.0.x'
            - run: cd gex
            - name: copy env and secrets
            - run: cp gex/env.template.json gex/env.json
            - run: cp gex/secrets.template.json gex/secrets.json
            - run: dotnet build --self-contained -r win-x64

